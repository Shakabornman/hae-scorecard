<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HAE Security — Shift Checklist</title>
<style>
/* ── TOKENS ── */
:root {
  --navy:   #1F3A5F;
  --navy-d: #162c4a;
  --gold:   #C8A24B;
  --ink:    #1a1c22;
  --mid:    #6b7280;
  --rule:   #e2e0da;
  --paper:  #f7f6f3;
  --white:  #ffffff;
  --green:  #3B6D11;
  --green-b:#EAF3DE;
  --amber:  #BA7517;
  --amber-b:#FAEEDA;
  --red:    #A32D2D;
  --red-b:  #FCEBEB;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
  padding-bottom: 100px;
}

/* ── HEADER ── */
.header {
  background: var(--navy);
  padding: 16px 20px 14px;
  position: sticky;
  top: 0;
  z-index: 20;
}
.header-brand {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 2px;
}
.header-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.01em;
}
.header-meta {
  font-size: 12px;
  color: #9FB3CC;
  margin-top: 2px;
}

/* ── AUTH SCREEN ── */
#auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--navy);
  padding: 24px;
}
.auth-card {
  background: var(--white);
  border-radius: 14px;
  padding: 36px 28px;
  width: 100%;
  max-width: 360px;
  text-align: center;
}
.auth-logo {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--mid);
  margin-bottom: 4px;
}
.auth-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 4px;
}
.auth-sub {
  font-size: 13px;
  color: var(--mid);
  margin-bottom: 28px;
}
.btn-google {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 13px 16px;
  background: var(--white);
  border: 1.5px solid var(--rule);
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  margin-bottom: 10px;
  transition: border-color 0.15s;
}
.btn-google:hover { border-color: var(--navy); }
.auth-divider {
  font-size: 11px;
  color: var(--mid);
  margin: 8px 0;
}
.auth-field {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--rule);
  border-radius: 8px;
  font-size: 14px;
  color: var(--ink);
  background: var(--white);
  margin-bottom: 10px;
  outline: none;
  transition: border-color 0.15s;
}
.auth-field:focus { border-color: var(--navy); }
.btn-primary {
  width: 100%;
  padding: 13px;
  background: var(--navy);
  color: var(--white);
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-primary:hover { background: var(--navy-d); }
.btn-primary:disabled { background: var(--mid); cursor: not-allowed; }
.auth-error {
  font-size: 12px;
  color: var(--red);
  margin-top: 8px;
  display: none;
}

/* ── MAIN FORM ── */
#form-screen { display: none; }

/* SHIFT SELECTOR */
.shift-bar {
  background: var(--white);
  border-bottom: 1px solid var(--rule);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.shift-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--mid);
  white-space: nowrap;
}
.shift-btns { display: flex; gap: 8px; }
.shift-btn {
  padding: 8px 20px;
  border-radius: 20px;
  border: 1.5px solid var(--rule);
  background: var(--white);
  font-size: 13px;
  font-weight: 600;
  color: var(--mid);
  cursor: pointer;
  transition: all 0.15s;
}
.shift-btn.active-day {
  background: var(--navy);
  border-color: var(--navy);
  color: var(--white);
}
.shift-btn.active-night {
  background: #1a1c3a;
  border-color: #1a1c3a;
  color: var(--white);
}
.user-pill {
  margin-left: auto;
  font-size: 12px;
  color: var(--mid);
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-signout {
  font-size: 11px;
  color: var(--mid);
  background: none;
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 3px 8px;
  cursor: pointer;
}

/* DATE BAR */
.date-bar {
  background: var(--paper);
  border-bottom: 1px solid var(--rule);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.date-bar label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--mid);
}
.date-bar input[type="date"] {
  font-size: 13px;
  padding: 6px 10px;
  border: 1.5px solid var(--rule);
  border-radius: 6px;
  background: var(--white);
  color: var(--ink);
  outline: none;
}
.date-bar input[type="date"]:focus { border-color: var(--navy); }

/* SECTIONS */
.form-body { padding: 16px 20px; max-width: 640px; margin: 0 auto; }

.section-card {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 10px;
  margin-bottom: 12px;
  overflow: hidden;
}
.section-head {
  background: var(--navy);
  padding: 11px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-letter {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}
.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 0.02em;
}
.section-body { padding: 4px 0; }

/* ITEMS */
.item-row {
  display: flex;
  align-items: center;
  padding: 11px 16px;
  border-bottom: 1px solid var(--rule);
  gap: 12px;
}
.item-row:last-child { border-bottom: none; }
.item-label {
  flex: 1;
  font-size: 14px;
  color: var(--ink);
  line-height: 1.4;
}
.item-label.data-label {
  font-size: 13px;
  color: var(--mid);
}

/* RATING BUTTONS */
.rating-group {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}
.r-btn {
  padding: 6px 10px;
  border-radius: 6px;
  border: 1.5px solid var(--rule);
  background: var(--white);
  font-size: 12px;
  font-weight: 600;
  color: var(--mid);
  cursor: pointer;
  transition: all 0.12s;
  min-width: 40px;
  text-align: center;
}
.r-btn:hover { border-color: var(--navy); color: var(--navy); }
.r-btn.sel-yes   { background: var(--green-b);  border-color: var(--green);  color: var(--green);  }
.r-btn.sel-most  { background: var(--amber-b);  border-color: var(--amber);  color: var(--amber);  }
.r-btn.sel-no    { background: var(--red-b);    border-color: var(--red);    color: var(--red);    }
.r-btn.sel-na    { background: #f0f0f0; border-color: #ccc; color: #888; }

/* DATA INPUTS */
.data-input {
  width: 120px;
  padding: 7px 10px;
  border: 1.5px solid var(--rule);
  border-radius: 6px;
  font-size: 13px;
  color: var(--ink);
  background: var(--white);
  outline: none;
  flex-shrink: 0;
}
.data-input:focus { border-color: var(--navy); }

/* NOTE ROW */
.note-row {
  padding: 10px 16px;
  border-top: 1px solid var(--rule);
}
.note-input {
  width: 100%;
  padding: 9px 12px;
  border: 1.5px solid var(--rule);
  border-radius: 6px;
  font-size: 13px;
  color: var(--ink);
  background: var(--paper);
  outline: none;
  resize: none;
  font-family: inherit;
  line-height: 1.4;
}
.note-input:focus { border-color: var(--navy); background: var(--white); }
.note-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--mid);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

/* SUBMIT BAR */
.submit-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--white);
  border-top: 1px solid var(--rule);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
  z-index: 20;
}
.submit-status {
  font-size: 12px;
  color: var(--mid);
}
.submit-status strong { color: var(--ink); }
.btn-submit {
  padding: 12px 28px;
  background: var(--navy);
  color: var(--white);
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s;
  letter-spacing: 0.02em;
}
.btn-submit:hover { background: var(--navy-d); }
.btn-submit:disabled { background: var(--mid); cursor: not-allowed; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--ink);
  color: var(--white);
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast.success { background: var(--green); }
.toast.error   { background: var(--red); }

/* NIGHT MODE HINT */
.night-hint {
  display: none;
  background: #1a1c3a;
  color: #9FB3CC;
  font-size: 12px;
  padding: 8px 20px;
  text-align: center;
}
.night-hint.show { display: block; }

/* MOBILE */
@media (max-width: 480px) {
  .r-btn { padding: 7px 7px; min-width: 36px; font-size: 11px; }
  .item-label { font-size: 13px; }
  .data-input { width: 100px; }
}
</style>
</head>
<body>

<!-- ── AUTH SCREEN ── -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Hospital at Ekhaya</div>
    <div class="auth-title">Security Checklist</div>
    <div class="auth-sub">Sign in to submit your shift report</div>

    <button class="btn-google" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Sign in with Google
    </button>

    <div class="auth-divider">or</div>

    <input class="auth-field" type="email" id="auth-email" placeholder="Email address">
    <input class="auth-field" type="password" id="auth-password" placeholder="Password">
    <button class="btn-primary" onclick="signInEmail()">Sign in</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ── FORM SCREEN ── -->
<div id="form-screen">

  <div class="header">
    <div class="header-brand">Hospital at Ekhaya</div>
    <div class="header-title">Security — Shift Checklist</div>
    <div class="header-meta" id="header-meta">—</div>
  </div>

  <div class="night-hint" id="night-hint">🌙 Night shift — check lights, lock-ups, and all after-hours items carefully</div>

  <div class="shift-bar">
    <span class="shift-label">Shift:</span>
    <div class="shift-btns">
      <button class="shift-btn active-day" id="btn-day"   onclick="setShift('day')">☀ Day</button>
      <button class="shift-btn"            id="btn-night" onclick="setShift('night')">🌙 Night</button>
    </div>
    <div class="user-pill">
      <span id="user-display"></span>
      <button class="btn-signout" onclick="doSignOut()">Out</button>
    </div>
  </div>

  <div class="date-bar">
    <label>Date:</label>
    <input type="date" id="shift-date">
  </div>

  <div class="form-body" id="form-body"></div>

  <div class="submit-bar">
    <div class="submit-status">
      <strong id="answered-count">0</strong> / <span id="total-count">0</span> items answered
    </div>
    <button class="btn-submit" id="btn-submit" onclick="submitForm()">Submit shift</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, setDoc, Timestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInWithPopup, GoogleAuthProvider,
         signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey:            "AIzaSyBla6UBluNcWVKPSU8U30IuTSubLb7R2Kc",
  authDomain:        "hae-vuma-92fca.firebaseapp.com",
  projectId:         "hae-vuma-92fca",
  storageBucket:     "hae-vuma-92fca.firebasestorage.app",
  messagingSenderId: "1052424261313",
  appId:             "1:1052424261313:web:a4bebe68d6f9ba14fa0e40"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

// ── SCHEMA — Security sections and items ──────────────────────────────────
const SECTIONS = [
  {
    id: 'mainGateEntrance', letter: 'A', label: 'Main Gate & Entrance Area',
    items: [
      { id: 'guardOnTime',            label: 'Guard reported on time and present',          type: 'rating' },
      { id: 'gateAreaClean',          label: 'Gate area clean and tidy — trash bins emptied', type: 'rating' },
      { id: 'noCigaretteButts',       label: 'No cigarette butts, matches or lighters',     type: 'rating' },
      { id: 'accessControlBook',      label: 'Access control book completed',                type: 'rating' },
      { id: 'visitorRegister',        label: 'Visitor register in use',                      type: 'rating' },
      { id: 'noUnauthorisedVisitors', label: 'No visitors or off-duty staff on premises',    type: 'rating' },
    ]
  },
  {
    id: 'wellnessCentre', letter: 'B', label: 'Wellness Centre Area',
    items: [
      { id: 'recAreaChairs',    label: 'Recreation area chairs under roof',     type: 'rating' },
      { id: 'gateDoorsLocked', label: 'Gate and doors locked after hours',     type: 'rating' },
      { id: 'fountainOff',     label: 'Water fountain switched off',            type: 'rating' },
      { id: 'tapsClosed',      label: 'All taps closed',                        type: 'rating' },
      { id: 'lightsOnNight',   label: 'Lights switched on at night',            type: 'rating' },
      { id: 'lightsOffDay',    label: 'Lights off during day',                  type: 'rating' },
      { id: 'areaCleanSecure', label: 'Area clean and secure',                  type: 'rating' },
    ]
  },
  {
    id: 'backOfBuilding', letter: 'C', label: 'Back of Building',
    items: [
      { id: 'airconOff',             label: 'Aircons switched off after hours',     type: 'rating' },
      { id: 'geysersSchedule',       label: 'Geysers switched off to schedule',     type: 'rating' },
      { id: 'externalLights',        label: 'External lights functioning',           type: 'rating' },
      { id: 'noSuspiciousPersons',   label: 'No suspicious persons loitering',       type: 'rating' },
      { id: 'areaFreeRubbish',       label: 'Area free of rubbish',                 type: 'rating' },
    ]
  },
  {
    id: 'generatorPower', letter: 'D', label: 'Generator & Power',
    items: [
      { id: 'electricityUnits', label: 'Electricity units remaining',        type: 'data',   placeholder: 'e.g. 245' },
      { id: 'powerOutage',      label: 'Power outage during this shift?',    type: 'data',   placeholder: 'Yes / No' },
      { id: 'generatorFull',    label: 'Generator checked and full',          type: 'rating' },
      { id: 'petrolChecked',    label: 'Petrol / fuel level checked',         type: 'rating' },
    ]
  },
  {
    id: 'rondavelToolRoom', letter: 'E', label: 'Rondavel & Tool Room',
    items: [
      { id: 'toolRoomLocked',  label: 'Tool room locked — key at gate',      type: 'rating' },
      { id: 'noToolsOutside',  label: 'No tools left outside',               type: 'rating' },
      { id: 'windowsSecure',   label: 'Windows closed and area secure',       type: 'rating' },
    ]
  },
  {
    id: 'wasteRoom', letter: 'F', label: 'Waste Room',
    items: [
      { id: 'wasteRoomLocked', label: 'Waste room door locked',              type: 'rating' },
      { id: 'binsClosed',      label: 'Bins properly closed',                type: 'rating' },
      { id: 'noSpillage',      label: 'No spillage or hazards visible',       type: 'rating' },
    ]
  },
  {
    id: 'mainBuildingNight', letter: 'G', label: 'Main Building — Night Security',
    nightOnly: true,
    items: [
      { id: 'externalDoorsLocked',  label: 'All external doors locked after 20:00',  type: 'rating' },
      { id: 'windowsClosed',        label: 'All windows closed',                      type: 'rating' },
      { id: 'passageLights',        label: 'Passage lights working',                  type: 'rating' },
      { id: 'emergencyLights',      label: 'Emergency lights functional',              type: 'rating' },
      { id: 'noUnauthorisedInside', label: 'No unauthorised persons inside',           type: 'rating' },
    ]
  },
  {
    id: 'generalSecurityChecks', letter: 'H', label: 'General Security Checks',
    items: [
      { id: 'noSuspiciousActivity', label: 'No suspicious activity observed',   type: 'rating' },
      { id: 'camerasOperational',   label: 'Cameras operational',               type: 'rating' },
      { id: 'radioCharged',         label: 'Radio charged',                     type: 'rating' },
      { id: 'perimeterSecure',      label: 'Perimeter secure',                  type: 'rating' },
      { id: 'fireExitsClear',       label: 'Fire exits clear',                  type: 'rating' },
      { id: 'noHazards',            label: 'No hazards identified',             type: 'rating' },
      { id: 'parkingSecure',        label: 'Parking area secure',               type: 'rating' },
    ]
  },
];

// ── STATE ─────────────────────────────────────────────────────────────────
let currentShift = 'day';
let currentUser  = null;
const answers    = {};   // sectionId.itemId -> value
const notes      = {};   // sectionId -> string

// ── AUTH ──────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('form-screen').style.display = 'block';
    document.getElementById('user-display').textContent = user.displayName || user.email?.split('@')[0] || 'Guard';
    initForm();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('form-screen').style.display = 'none';
  }
});

window.signInGoogle = async () => {
  try {
    await signInWithPopup(auth, new GoogleAuthProvider());
  } catch (e) { showAuthError(e.message); }
};

window.signInEmail = async () => {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-password').value;
  if (!email || !pass) { showAuthError('Enter your email and password.'); return; }
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) { showAuthError('Invalid email or password.'); }
};

window.doSignOut = () => signOut(auth);

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

// ── SHIFT ─────────────────────────────────────────────────────────────────
window.setShift = function(shift) {
  currentShift = shift;
  document.getElementById('btn-day').className   = 'shift-btn' + (shift === 'day'   ? ' active-day'   : '');
  document.getElementById('btn-night').className = 'shift-btn' + (shift === 'night' ? ' active-night' : '');
  document.getElementById('night-hint').className = 'night-hint' + (shift === 'night' ? ' show' : '');
  renderForm();
  updateMeta();
};

// ── INIT ──────────────────────────────────────────────────────────────────
function initForm() {
  // Default date = today
  const today = new Date();
  const yyyy  = today.getFullYear();
  const mm    = String(today.getMonth() + 1).padStart(2, '0');
  const dd    = String(today.getDate()).padStart(2, '0');
  document.getElementById('shift-date').value = `${yyyy}-${mm}-${dd}`;
  document.getElementById('shift-date').addEventListener('change', updateMeta);

  renderForm();
  updateMeta();
}

function updateMeta() {
  const dateVal = document.getElementById('shift-date').value;
  const dateStr = dateVal
    ? new Date(dateVal + 'T12:00:00').toLocaleDateString('en-ZA', { weekday:'long', day:'numeric', month:'long', year:'numeric' })
    : '—';
  const shiftStr = currentShift === 'day' ? '☀ Day Shift' : '🌙 Night Shift';
  document.getElementById('header-meta').textContent = `${shiftStr} · ${dateStr}`;
}

// ── RENDER FORM ───────────────────────────────────────────────────────────
function renderForm() {
  const body = document.getElementById('form-body');
  body.innerHTML = '';

  let totalRating = 0;
  let answered    = 0;

  const activeSections = SECTIONS.filter(s => {
    if (s.nightOnly && currentShift !== 'night') return false;
    return true;
  });

  for (const sec of activeSections) {
    const card = document.createElement('div');
    card.className = 'section-card';

    // Section header
    card.innerHTML = `
      <div class="section-head">
        <div class="section-letter">${sec.letter}</div>
        <div class="section-title">${sec.label}</div>
      </div>
      <div class="section-body" id="sec-body-${sec.id}"></div>`;

    body.appendChild(card);
    const secBody = card.querySelector(`#sec-body-${sec.id}`);

    // Items
    for (const item of sec.items) {
      const key = `${sec.id}.${item.id}`;

      if (item.type === 'rating') {
        totalRating++;
        const val = answers[key] || '';
        if (val) answered++;

        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
          <span class="item-label">${item.label}</span>
          <div class="rating-group">
            <button class="r-btn ${val === 'Yes'  ? 'sel-yes'  : ''}" onclick="setAnswer('${sec.id}','${item.id}','Yes')">Yes</button>
            <button class="r-btn ${val === 'Most' ? 'sel-most' : ''}" onclick="setAnswer('${sec.id}','${item.id}','Most')">Most</button>
            <button class="r-btn ${val === 'No'   ? 'sel-no'   : ''}" onclick="setAnswer('${sec.id}','${item.id}','No')">No</button>
            <button class="r-btn ${val === 'N-A'  ? 'sel-na'   : ''}" onclick="setAnswer('${sec.id}','${item.id}','N-A')">N/A</button>
          </div>`;
        secBody.appendChild(row);

      } else if (item.type === 'data') {
        const val = answers[key] || '';
        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
          <span class="item-label data-label">${item.label}</span>
          <input class="data-input" type="text"
            placeholder="${item.placeholder || ''}"
            value="${val}"
            onchange="setDataAnswer('${sec.id}','${item.id}',this.value)"
            oninput="setDataAnswer('${sec.id}','${item.id}',this.value)">`;
        secBody.appendChild(row);
      }
    }

    // Note field
    const noteRow = document.createElement('div');
    noteRow.className = 'note-row';
    noteRow.innerHTML = `
      <div class="note-label">Notes — add if any answer is not Yes</div>
      <textarea class="note-input" rows="2"
        placeholder="Optional note for this section…"
        onchange="setNote('${sec.id}',this.value)"
        oninput="setNote('${sec.id}',this.value)">${notes[sec.id] || ''}</textarea>`;
    secBody.appendChild(noteRow);
  }

  document.getElementById('answered-count').textContent = answered;
  document.getElementById('total-count').textContent    = totalRating;
}

// ── ANSWER HANDLERS ───────────────────────────────────────────────────────
window.setAnswer = function(secId, itemId, val) {
  const key = `${secId}.${itemId}`;
  answers[key] = val;
  renderForm();
};

window.setDataAnswer = function(secId, itemId, val) {
  answers[`${secId}.${itemId}`] = val;
};

window.setNote = function(secId, val) {
  notes[secId] = val;
};

// ── SUBMIT ────────────────────────────────────────────────────────────────
window.submitForm = async function() {
  const dateVal = document.getElementById('shift-date').value;
  if (!dateVal) {
    showToast('Select a date first', 'error');
    return;
  }

  // Count unanswered rating items
  const activeSecs = SECTIONS.filter(s => !(s.nightOnly && currentShift !== 'night'));
  let unanswered = 0;
  for (const sec of activeSecs) {
    for (const item of sec.items) {
      if (item.type === 'rating' && !answers[`${sec.id}.${item.id}`]) unanswered++;
    }
  }

  // Warning gate — confirm if items unanswered
  if (unanswered > 0) {
    const msg = unanswered === 1
      ? `1 item has not been answered. Submit anyway?`
      : `${unanswered} items have not been answered. Submit anyway?`;
    if (!confirm(msg)) return;
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  // Build sections document
  const sectionsData = {};
  const activeSections = SECTIONS.filter(s => !(s.nightOnly && currentShift !== 'night'));

  for (const sec of activeSections) {
    const items = {};
    for (const item of sec.items) {
      items[item.id] = answers[`${sec.id}.${item.id}`] || '';
    }
    sectionsData[sec.id] = {
      items,
      note: notes[sec.id] || '',
    };
  }

  // Week ending (Thursday)
  const entryDate = new Date(dateVal + 'T12:00:00Z');
  const dayOfWeek = entryDate.getUTCDay();
  const daysToThu = (4 - dayOfWeek + 7) % 7;
  const thu = new Date(entryDate);
  thu.setUTCDate(entryDate.getUTCDate() + daysToThu);
  const weekEnding = thu.toISOString().split('T')[0];

  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dayStr = days[entryDate.getUTCDay()];

  // Document ID — unique per dept/date/shift
  const docId = `security__${dateVal}__${currentShift}`;

  const submissionDoc = {
    deptId:           'security',
    deptLabel:        'Security',
    date:             Timestamp.fromDate(new Date(dateVal + 'T00:00:00Z')),
    dateStr:          dateVal,
    dayOfWeek:        dayStr,
    shift:            currentShift,
    weekEnding,
    submittedBy:      currentUser?.uid || '',
    submittedByEmail: currentUser?.email || '',
    submittedByName:  currentUser?.displayName || currentUser?.email?.split('@')[0] || 'Guard',
    submittedAt:      Timestamp.now(),
    sections:         sectionsData,
    migratedFromLegacy: false,
  };

  try {
    await setDoc(doc(db, 'submissions', docId), submissionDoc);

    showToast('✓ Shift submitted', 'success');

    // Clear form for next shift
    setTimeout(() => {
      Object.keys(answers).forEach(k => delete answers[k]);
      Object.keys(notes).forEach(k => delete notes[k]);
      renderForm();
      btn.disabled = false;
      btn.textContent = 'Submit shift';
    }, 1200);

  } catch (e) {
    showToast('Submit failed: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Submit shift';
  }
};

// ── TOAST ─────────────────────────────────────────────────────────────────
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => { t.className = 'toast'; }, 2800);
}

</script>
